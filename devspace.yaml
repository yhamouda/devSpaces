version: v1beta11

deployments:
  - name: devspaces-demo
    kubectl:
      manifests:
        - k8s/

dev:
  ports:
    # Changed to match the new image in deployment.yaml
    - imageSelector: python:3.9-slim
      forward:
        - port: 8080
  sync:
    # Changed to match the new image in deployment.yaml
    - imageSelector: python:3.9-slim
      localSubPath: .
      containerPath: /tmp/devspaces-demo

commands:
  - name: install-deps
    # Updated the cd path to match
    command: devspace enter -- bash -lc "cd /tmp/devspaces-demo && pip install -r requirements.txt"
  - name: run-app
    # Updated the cd path to match
    command: devspace enter -- bash -lc "cd /tmp/devspaces-demo && python app.py"