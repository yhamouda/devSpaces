version: v1beta11

deployments:
  - name: devspaces-demo
    kubectl:
      manifests:
        - k8s/

dev:
  ports:
    - imageSelector: python:3.9-slim
      forward:
        - port: 8080
  sync:
    - imageSelector: python:3.9-slim
      localSubPath: .
      containerPath: /tmp/devspaces-demo

commands:
  - name: start-demo
    # Bypasses venv entirely by installing dependencies into a simple 'packages' folder
    command: devspace enter -- bash -lc "cd /tmp/devspaces-demo && pip install -r requirements.txt --target=/tmp/devspaces-demo/packages && export PYTHONPATH=/tmp/devspaces-demo/packages && python app.py"