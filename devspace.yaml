version: v1beta11

deployments:
  - name: devspaces-demo
    kubectl:
      manifests:
        - k8s/

dev:
  ports:
    - imageSelector: python:3.9-slim
      forward:
        - port: 8080
  sync:
    - imageSelector: python:3.9-slim
      localSubPath: .
      containerPath: /tmp/devspaces-demo

commands:
  - name: start-demo
    # This single command chains the entire setup and launch process!
    command: devspace enter -- bash -lc "cd /tmp/devspaces-demo && python -m venv venv && source venv/bin/activate && pip install -r requirements.txt && python app.py"